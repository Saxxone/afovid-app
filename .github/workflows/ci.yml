name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: package-lock.json
      - run: npm ci
      - name: i18n key parity (app en.ts keys ⊆ web en.json)
        run: npx --yes tsx@4.19.2 "${GITHUB_WORKSPACE}/scripts/check-i18n-key-parity.mts"
      - run: npm run lint
      - run: npx tsc --noEmit
      - run: npx jest --ci
